/* ─────────────────────────────────────────────

───────────────────────────────────────────── */
const COLORS=[C.p600,C.p500,"#2563eb","#7c3aed","#db2777","#ea580c","#0891b2","#16a34a"];
const avColor=s=>{let h=0;for(let i=0;i<(s||"").length;i++)h=(h*31+s.charCodeAt(i))&0xffff;return COLORS[h%COLORS.length]};
const initials=n=>{const p=(n||"?").trim().split(" ").filter(Boolean);return(p.length>=2?p[0][0]+p[1][0]:p[0]?.[0]||"?").toUpperCase()};
const fmtDate=d=>{if(!d)return"";return new Date(d).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})};
const fmtTime=t=>{if(!t)return"";const[h,m]=t.split(":");return`${+h%12||12}:${m} ${+h>=12?"PM":"AM"}`};
const timeAgo=d=>{if(!d)return"Never";const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return"Just now";if(s<3600)return`${Math.floor(s/60)}m ago`;if(s<86400)return`${Math.floor(s/3600)}h ago`;return`${Math.floor(s/86400)}d ago`};
const activityStatus=last=>{if(!last)return"dormant";const m=(Date.now()-new Date(last))/60000;if(m<5)return"online";if(m<1440)return"today";if(m<43200)return"inactive";return"dormant"};
const activityLabel=s=>({online:"Online now",today:"Active today",inactive:"Active this month",dormant:"Dormant"}[s]||"Dormant");
const activityColor=s=>({online:C.online,today:C.today,inactive:C.inactive,dormant:C.dormant}[s]||C.dormant);
const pushNotif=async(userId,title,body,type="info")=>{if(!userId)return;await db.from("notifications").insert({user_id:userId,title,body,type})};

/* ─────────────────────────────────────────────
   PRIMITIVE COMPONENTS
───────────────────────────────────────────── */
const Spinner=({s=20,c=C.p500})=><div style={{width:s,height:s,borderRadius:"50%",border:`2.5px solid ${c}22`,borderTopColor:c,animation:"spin .7s linear infinite",flexShrink:0}}/>;

const Avatar=({name="",size=36,url,style:st={}})=>url
  ?<img src={url} style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",flexShrink:0,...st}}/>
  :<div style={{width:size,height:size,borderRadius:"50%",background:avColor(name),color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.36,fontWeight:700,flexShrink:0,...st}}>{initials(name)}</div>;

const Badge=({label,bg,color,dot})=><span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:600,padding:"3px 8px",borderRadius:99,background:bg||C.p50,color:color||C.p600,whiteSpace:"nowrap"}}>
  {dot&&<span style={{width:6,height:6,borderRadius:"50%",background:color||C.p600,flexShrink:0}}/>}{label}
</span>;

const ProgressBar=({value=0,color=C.p500,height=6})=><div style={{height,borderRadius:99,background:C.n100,overflow:"hidden"}}>
  <div style={{height:"100%",width:`${Math.min(100,Math.max(0,value))}%`,background:color,borderRadius:99,transition:"width .5s ease"}}/>
</div>;

const Field=({label,type="text",placeholder,value,onChange,error,helper,rows,required,min,max})=>{
  const [focus,setFocus]=useState(false);
  const border=error?C.danger:focus?C.p500:C.border;
  const base={width:"100%",padding:"11px 13px",borderRadius:9,border:`1.5px solid ${border}`,fontSize:14,color:C.text,background:"#fff",outline:"none",display:"block",lineHeight:1.5,transition:"border-color .15s"};
  return <div style={{marginBottom:15}}>
    {label&&<label style={{display:"block",fontSize:12.5,fontWeight:600,color:C.muted,marginBottom:5,letterSpacing:".01em"}}>{label}{required&&<span style={{color:C.danger}}> *</span>}</label>}
    {rows?<textarea placeholder={placeholder} value={value} onChange={onChange} rows={rows} onFocus={()=>setFocus(true)} onBlur={()=>setFocus(false)} style={{...base,resize:"vertical"}}/>
    :<input type={type} placeholder={placeholder} value={value} onChange={onChange} onFocus={()=>setFocus(true)} onBlur={()=>setFocus(false)} min={min} max={max} style={base}/>}
    {error&&<div style={{fontSize:12,color:C.danger,marginTop:4}}>{error}</div>}
    {helper&&!error&&<div style={{fontSize:12,color:C.light,marginTop:4}}>{helper}</div>}
  </div>;
};

const Select=({label,value,onChange,options=[]})=><div style={{marginBottom:15}}>
  {label&&<label style={{display:"block",fontSize:12.5,fontWeight:600,color:C.muted,marginBottom:5}}>{label}</label>}
  <select value={value} onChange={onChange} style={{width:"100%",padding:"11px 13px",borderRadius:9,border:`1.5px solid ${C.border}`,fontSize:14,color:C.text,background:"#fff",outline:"none",cursor:"pointer"}}>
    {options.map(o=><option key={o.value??o} value={o.value??o}>{o.label??o}</option>)}
  </select>
</div>;

const Btn=({children,onClick,variant="primary",size="md",loading,disabled,style:ext={}})=>{
  const bg={primary:C.p600,outline:"transparent",ghost:"transparent",danger:"transparent",success:C.success,warning:C.warn};
  const col={primary:"#fff",outline:C.muted,ghost:C.muted,danger:C.danger,success:"#fff",warning:"#fff"};
  const border={primary:"none",outline:`1.5px solid ${C.border}`,ghost:"none",danger:`1.5px solid ${C.dangerB}`,success:"none",warning:"none"};
  const pad={sm:"6px 14px",md:"9px 18px",lg:"12px 24px"};
  const fs={sm:12,md:13,lg:15};
  return <button onClick={onClick} disabled={disabled||loading} style={{display:"inline-flex",alignItems:"center",justifyContent:"center",gap:7,padding:pad[size],borderRadius:9,border:border[variant],background:bg[variant],color:col[variant],fontSize:fs[size],fontWeight:700,cursor:disabled||loading?"not-allowed":"pointer",opacity:disabled?.6:1,transition:"all .15s",letterSpacing:".01em",...ext}}>
    {loading&&<Spinner s={13} c={variant==="primary"||variant==="success"?"#fff":C.p500}/>}{children}
  </button>;
};

const Modal=({open,onClose,title,children,wide=false})=>{

const ConfirmDialog=({open,title,body,confirmText="Confirm",danger=false,onConfirm,onCancel,loading})=>{

/* Toast */
const useToast=()=>{
  const [t,setT]=useState(null);
  const show=(msg,type="success")=>{setT({msg,type});setTimeout(()=>setT(null),3200)};
  const Toast=()=>t?<div style={{position:"fixed",bottom:72,left:"50%",transform:"translateX(-50%)",padding:"11px 20px",borderRadius:10,fontSize:13,fontWeight:600,zIndex:999,boxShadow:C.shadowM,pointerEvents:"none",animation:"fadeUp .2s ease",background:t.type==="success"?C.success:t.type==="warn"?C.warn:C.danger,color:"#fff",whiteSpace:"nowrap"}}>{t.msg}</div>:null;
  return [Toast,show];
};

      {open&&<div style={{position:"absolute",right:0,top:44,width:310,background:"#fff",borderRadius:14,border:`1px solid ${C.border}`,boxShadow:C.shadowM,zIndex:100,overflow:"hidden",animation:"fadeIn .15s ease"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,fontSize:13,fontWeight:700,color:C.text}}>Notifications</div>

/* ─────────────────────────────────────────────
   DASHBOARD
───────────────────────────────────────────── */
const Dashboard=({profile})=>{
  const [d,setD]=useState({sessions:[],goals:[],msgs:[],quizzes:[]});
  const [loading,setLoading]=useState(true);
  const isMentor=profile.role==="mentor";

  useEffect(()=>{load()},[]);
  const load=async()=>{
    const col=isMentor?"mentor_id":"mentee_id";
    const[s,g,m,q]=await Promise.all([
      db.from("sessions").select("*,mentor:profiles!sessions_mentor_id_fkey(full_name,avatar_url),mentee:profiles!sessions_mentee_id_fkey(full_name,avatar_url)").eq(col,profile.id).eq("status","upcoming").order("session_date",{ascending:true}).limit(3),
      db.from("goals").select("*").eq("owner_id",profile.id).order("created_at",{ascending:false}).limit(4),
      db.from("messages").select("*,sender:profiles!messages_sender_id_fkey(id,full_name,avatar_url),recipient:profiles!messages_recipient_id_fkey(id,full_name,avatar_url)").or(`sender_id.eq.${profile.id},recipient_id.eq.${profile.id}`).order("created_at",{ascending:false}).limit(40),
      isMentor
        ?db.from("quizzes").select("*,assignments:quiz_assignments(*)").eq("mentor_id",profile.id).limit(4)
        :db.from("quiz_assignments").select("*,quiz:quizzes(*)").eq("mentee_id",profile.id).eq("status","assigned").limit(4),
    ]);
    const seen=new Set(),convos=[];
    for(const msg of(m.data||[])){const o=msg.sender_id===profile.id?msg.recipient:msg.sender;if(o&&!seen.has(o.id)){seen.add(o.id);convos.push({other:o,last:msg})}}
    setD({sessions:s.data||[],goals:g.data||[],msgs:convos.slice(0,3),quizzes:q.data||[]});
    setLoading(false);
  };
  const hour=new Date().getHours();
  const greet=hour<12?"Good morning":hour<17?"Good afternoon":"Good evening";
  const next=d.sessions[0];

  return <div style={{padding:"28px 32px",maxWidth:860,display:"flex",flexDirection:"column",gap:24}} className="anim">
    <div>
      <div style={{fontSize:12,color:C.muted,fontWeight:500,marginBottom:4}}>{new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
      <h1 style={{fontSize:26,fontWeight:800,color:C.text,letterSpacing:"-.03em"}}>{greet}, {profile.full_name?.split(" ")[0]} 👋</h1>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
      {[{l:"Upcoming Sessions",v:d.sessions.length,icon:"📅"},{l:"Active Goals",v:d.goals.filter(g=>g.status==="active").length,icon:"🎯"},{l:isMentor?"Quizzes Created":"Pending Quizzes",v:d.quizzes.length,icon:"📝"}].map((s,i)=>(
        <div key={i} style={{background:"#fff",borderRadius:12,padding:"18px",border:`1px solid ${C.border}`,boxShadow:C.shadow}}>
          <div style={{fontSize:22}}>{s.icon}</div>
          <div style={{fontSize:28,fontWeight:800,color:C.p600,marginTop:6,letterSpacing:"-.04em"}}>{loading?"—":s.v}</div>
          <div style={{fontSize:12.5,fontWeight:600,color:C.muted,marginTop:2}}>{s.l}</div>
        </div>
      ))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
      <div style={{background:next?C.p700:"#fff",borderRadius:14,padding:"22px",border:`1px solid ${C.border}`,position:"relative",overflow:"hidden"}}>
        {next&&<div style={{position:"absolute",right:-20,top:-20,width:100,height:100,borderRadius:"50%",background:"rgba(255,255,255,.06)"}}/>}
        <div style={{fontSize:11,fontWeight:700,letterSpacing:".07em",color:next?"rgba(255,255,255,.6)":C.muted,textTransform:"uppercase",marginBottom:10}}>Next Session</div>
        {next?<>
          <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:6}}>{next.title}</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,.7)"}}>with {isMentor?next.mentee?.full_name:next.mentor?.full_name}</div>
          <div style={{marginTop:14,display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,.9)"}}>{fmtDate(next.session_date)}</span>
            <span style={{fontSize:11,background:"rgba(255,255,255,.15)",padding:"3px 10px",borderRadius:99,color:"rgba(255,255,255,.8)",fontWeight:600}}>{next.duration_minutes} min</span>
          </div>
        </>:<Empty icon="📅" title="No upcoming sessions" body="Book your first session."/>}
      </div>
      <div style={{background:"#fff",borderRadius:14,padding:"22px",border:`1px solid ${C.border}`,boxShadow:C.shadow}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:".07em",color:C.muted,textTransform:"uppercase",marginBottom:14}}>Goal Progress</div>
        {d.goals.length===0?<Empty icon="🎯" title="No goals yet"/>:
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {d.goals.slice(0,3).map(g=><div key={g.id}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span style={{fontSize:12.5,fontWeight:600,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",paddingRight:8}}>{g.title}</span>
              <span style={{fontSize:12,fontWeight:700,color:C.p500,flexShrink:0}}>{g.progress||0}%</span>
            </div>
            <ProgressBar value={g.progress||0}/>
          </div>)}
        </div>}
      </div>
    </div>
    {d.msgs.length>0&&<div>
      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>Recent Conversations</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {d.msgs.map(c=><div key={c.other.id} style={{background:"#fff",borderRadius:11,padding:"12px 14px",border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,boxShadow:C.shadow}}>
          <Avatar name={c.other.full_name} size={36} url={c.other.avatar_url}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:700,color:C.text}}>{c.other.full_name}</div>
            <div style={{fontSize:12,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:2}}>{c.last.content}</div>
          </div>
          <span style={{fontSize:11,color:C.light,flexShrink:0}}>{timeAgo(c.last.created_at)}</span>
        </div>)}
      </div>
    </div>}
  </div>;
};

/* ─────────────────────────────────────────────
   SESSIONS
───────────────────────────────────────────── */
const Sessions=({profile})=>{
  const [sessions,setSessions]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filter,setFilter]=useState("upcoming");
  const [modal,setModal]=useState(false);
  const [saving,setSaving]=useState(false);
  const [pairs,setPairs]=useState([]);
  const [form,setForm]=useState({title:"",description:"",other_id:"",date:"",time:"",duration:"60",type:"video"});
  const [Toast,showToast]=useToast();
  const col=profile.role==="mentor"?"mentor_id":"mentee_id";

  useEffect(()=>{load();loadPairs()},[filter]);
  const load=async()=>{
    setLoading(true);
    const{data}=await db.from("sessions").select("*,mentor:profiles!sessions_mentor_id_fkey(id,full_name,avatar_url),mentee:profiles!sessions_mentee_id_fkey(id,full_name,avatar_url)").eq(col,profile.id).eq("status",filter).order("session_date",{ascending:filter==="upcoming"});
    setSessions(data||[]);setLoading(false);
  };
  const loadPairs=async()=>{
    const oCol=profile.role==="mentor"?"mentee_id":"mentor_id";
    const fCol=profile.role==="mentor"?"mentor_id":"mentee_id";
    const{data}=await db.from("pairings").select(`other:profiles!pairings_${oCol}_fkey(id,full_name)`).eq(fCol,profile.id);
    setPairs(data?.map(p=>p.other)||[]);
  };
  const book=async()=>{
    if(!form.title||!form.other_id||!form.date||!form.time){showToast("Fill in all required fields","error");return}
    setSaving(true);
    const mId=profile.role==="mentor"?profile.id:form.other_id;
    const meId=profile.role==="mentee"?profile.id:form.other_id;
    const{error}=await db.from("sessions").insert({title:form.title,description:form.description,mentor_id:mId,mentee_id:meId,org_id:profile.org_id,session_date:form.date,session_time:form.time,duration_minutes:parseInt(form.duration),type:form.type});
    if(error){showToast(error.message,"error");setSaving(false);return}
    await pushNotif(form.other_id,"Session Booked",`${profile.full_name} booked: ${form.title} on ${form.date}`,"session");
    showToast("Session booked!");setSaving(false);setModal(false);setForm({title:"",description:"",other_id:"",date:"",time:"",duration:"60",type:"video"});load();
  };
  const markDone=async(s)=>{
    await db.from("sessions").update({status:"completed"}).eq("id",s.id);
    await pushNotif(s.mentee_id,"Session Completed",`Your session "${s.title}" has been marked complete.`,"session");
    showToast("Marked complete");load();
  };
  const cancel=async(s)=>{
    await db.from("sessions").update({status:"cancelled"}).eq("id",s.id);
    showToast("Cancelled","warn");load();
  };

  return <div style={{padding:"28px 32px",maxWidth:780}} className="anim">
    <Toast/>
    <Modal open={modal} onClose={()=>setModal(false)} title="Book a Session">
      <Field label="Session title" placeholder="e.g. Brand Strategy Kickoff" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} required/>
      <Select label={profile.role==="mentor"?"Select Mentee":"Select Mentor"} value={form.other_id} onChange={e=>setForm(f=>({...f,other_id:e.target.value}))} options={[{value:"",label:"-- Choose --"},...pairs.map(p=>({value:p.id,label:p.full_name}))]}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Field label="Date" type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} required/>
        <Field label="Time" type="time" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))} required/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Select label="Duration" value={form.duration} onChange={e=>setForm(f=>({...f,duration:e.target.value}))} options={["30","45","60","90","120"].map(v=>({value:v,label:`${v} min`}))}/>
        <Select label="Format" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))} options={[{value:"video",label:"📹 Video"},{value:"in-person",label:"📍 In-person"},{value:"phone",label:"📞 Phone"}]}/>
      </div>
      <Field label="Notes (optional)" placeholder="Topics to cover…" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} rows={2}/>
      <Btn onClick={book} loading={saving} style={{width:"100%",marginTop:6}}>Book Session</Btn>
    </Modal>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
      <div><h1 style={{fontSize:22,fontWeight:800,color:C.text,letterSpacing:"-.03em"}}>Sessions</h1><p style={{fontSize:13,color:C.muted,marginTop:3}}>Your mentorship meetings</p></div>
      <Btn onClick={()=>setModal(true)}>+ Book Session</Btn>
    </div>
    <div style={{display:"flex",gap:4,padding:4,background:C.n50,borderRadius:10,marginBottom:20,width:"fit-content"}}>
      {["upcoming","completed","cancelled"].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:"7px 16px",borderRadius:7,border:"none",fontSize:12.5,fontWeight:600,background:filter===f?C.p600:"transparent",color:filter===f?"#fff":C.muted,cursor:"pointer"}}>{f.charAt(0).toUpperCase()+f.slice(1)}</button>)}
    </div>
    {loading?<div style={{padding:40,textAlign:"center"}}><Spinner/></div>:
    sessions.length===0?<Empty icon="📅" title={`No ${filter} sessions`} action={filter==="upcoming"&&<Btn onClick={()=>setModal(true)}>Book First Session</Btn>}/>:
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {sessions.map(s=>{
        const other=profile.role==="mentor"?s.mentee:s.mentor;
        return <div key={s.id} style={{background:"#fff",borderRadius:13,padding:"16px 20px",border:`1px solid ${C.border}`,boxShadow:C.shadow,display:"flex",alignItems:"center",gap:16}}>
          <div style={{width:44,height:44,borderRadius:10,background:C.p50,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <div style={{fontSize:9,fontWeight:700,color:C.p400,textTransform:"uppercase"}}>{fmtDate(s.session_date).split(" ")[0]}</div>
            <div style={{fontSize:18,fontWeight:800,color:C.p600,lineHeight:1}}>{fmtDate(s.session_date).split(" ")[1]}</div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:700,color:C.text}}>{s.title}</div>
            <div style={{fontSize:12,color:C.muted,marginTop:3}}>with {other?.full_name} · {fmtTime(s.session_time)} · {s.duration_minutes} min</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
            <Badge label={s.type==="video"?"📹 Video":s.type==="in-person"?"📍 In-person":"📞 Phone"}/>
            {s.status==="upcoming"&&profile.role==="mentor"&&<Btn size="sm" onClick={()=>markDone(s)}>Done</Btn>}
            {s.status==="upcoming"&&<Btn size="sm" variant="outline" onClick={()=>cancel(s)}>Cancel</Btn>}
          </div>
        </div>;
      })}
    </div>}
  </div>;
};

/* ─────────────────────────────────────────────
   GOALS
───────────────────────────────────────────── */
const Goals=({profile})=>{
  const [goals,setGoals]=useState([]);
  const [loading,setLoading]=useState(true);
  const [expanded,setExpanded]=useState(null);
  const [modal,setModal]=useState(false);
  const [saving,setSaving]=useState(false);
  const [Toast,showToast]=useToast();
  const [form,setForm]=useState({title:"",description:"",category:"Personal Growth",due_date:"",milestones:["","",""]});
  const catColors={"Business":{bg:"#eff6ff",c:"#1d4ed8"},"Community":{bg:C.p50,c:C.p700},"Thought Leadership":{bg:"#fefce8",c:"#a16207"},"Personal Growth":{bg:"#fdf4ff",c:"#7e22ce"},"Personal":{bg:"#fff7ed",c:"#c2410c"}};

  useEffect(()=>{load()},[]);
  const load=async()=>{
    setLoading(true);
    const{data}=await db.from("goals").select("*,milestones(*)").eq("owner_id",profile.id).order("created_at",{ascending:false});
    setGoals(data||[]);setLoading(false);
  };
  const save=async()=>{
    if(!form.title){showToast("Enter a title","error");return}
    setSaving(true);
    const{data:g,error}=await db.from("goals").insert({title:form.title,description:form.description,category:form.category,due_date:form.due_date||null,owner_id:profile.id,org_id:profile.org_id,progress:0}).select().single();
    if(error){showToast(error.message,"error");setSaving(false);return}
    const ms=form.milestones.filter(m=>m.trim());
    if(ms.length&&g)await db.from("milestones").insert(ms.map((t,i)=>({goal_id:g.id,title:t,order_index:i})));
    showToast("Goal added!");setSaving(false);setModal(false);setForm({title:"",description:"",category:"Personal Growth",due_date:"",milestones:["","",""]});load();
  };
  const toggleMS=async(mId,goalId,done)=>{
    await db.from("milestones").update({completed:done}).eq("id",mId);
    const g=goals.find(x=>x.id===goalId);
    if(g){
      const ms=g.milestones.map(m=>m.id===mId?{...m,completed:done}:m);
      const prog=ms.length?Math.round(ms.filter(m=>m.completed).length/ms.length*100):0;
      await db.from("goals").update({progress:prog}).eq("id",goalId);
    }
    load();
  };

  return <div style={{padding:"28px 32px",maxWidth:760}} className="anim">
    <Toast/>
    <Modal open={modal} onClose={()=>setModal(false)} title="Add a Goal">
      <Field label="Goal title" placeholder="What do you want to achieve?" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} required/>
      <Field label="Description" placeholder="Describe what success looks like…" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} rows={2}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Select label="Category" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} options={Object.keys(catColors)}/>
        <Field label="Due date" type="date" value={form.due_date} onChange={e=>setForm(f=>({...f,due_date:e.target.value}))}/>
      </div>
      <div style={{marginBottom:15}}>
        <label style={{display:"block",fontSize:12.5,fontWeight:600,color:C.muted,marginBottom:6}}>Milestones (optional)</label>
        {form.milestones.map((m,i)=><input key={i} placeholder={`Milestone ${i+1}`} value={m} onChange={e=>{const ms=[...form.milestones];ms[i]=e.target.value;setForm(f=>({...f,milestones:ms}))}} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:`1.5px solid ${C.border}`,fontSize:13,marginBottom:7,outline:"none",display:"block",color:C.text}}/>)}
      </div>
      <Btn onClick={save} loading={saving} style={{width:"100%"}}>Save Goal</Btn>
    </Modal>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
      <div><h1 style={{fontSize:22,fontWeight:800,color:C.text,letterSpacing:"-.03em"}}>Goals</h1><p style={{fontSize:13,color:C.muted,marginTop:3}}>Track your progress</p></div>
      <Btn onClick={()=>setModal(true)}>+ Add Goal</Btn>
    </div>
    {loading?<div style={{padding:40,textAlign:"center"}}><Spinner/></div>:
    goals.length===0?<Empty icon="🎯" title="No goals yet" body="Set your first goal and start tracking milestones." action={<Btn onClick={()=>setModal(true)}>Add First Goal</Btn>}/>:
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {goals.map(g=>{
        const cat=catColors[g.category]||catColors["Personal Growth"];
        const ms=g.milestones||[];
        const isOpen=expanded===g.id;
        return <div key={g.id} style={{background:"#fff",borderRadius:14,border:`1px solid ${C.border}`,boxShadow:C.shadow,overflow:"hidden"}}>
          <div style={{padding:"18px 20px",cursor:"pointer"}} onClick={()=>setExpanded(isOpen?null:g.id)}>
            <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:7,flexWrap:"wrap"}}>
                  <span style={{fontSize:14.5,fontWeight:700,color:C.text}}>{g.title}</span>
                  <Badge label={g.category} bg={cat.bg} color={cat.c}/>
                </div>
                {g.due_date&&<div style={{fontSize:12,color:C.light,marginBottom:8}}>Due {fmtDate(g.due_date)} · {ms.length} milestone{ms.length!==1?"s":""}</div>}
                <ProgressBar value={g.progress||0}/>
              </div>
              <div style={{fontSize:22,fontWeight:800,color:C.p600,letterSpacing:"-.04em",flexShrink:0}}>{g.progress||0}%</div>
            </div>
          </div>
          {isOpen&&ms.length>0&&<div style={{padding:"14px 20px 18px",borderTop:`1px solid ${C.n50}`}}>
            <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Milestones</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {ms.sort((a,b)=>a.order_index-b.order_index).map(m=>(
                <div key={m.id} style={{display:"flex",gap:10,alignItems:"center",cursor:"pointer"}} onClick={()=>toggleMS(m.id,g.id,!m.completed)}>
                  <div style={{width:18,height:18,borderRadius:"50%",border:`2px solid ${m.completed?C.p500:C.n300}`,background:m.completed?C.p500:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .2s"}}>
                    {m.completed&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}
                  </div>
                  <span style={{fontSize:13,color:m.completed?C.muted:C.text,textDecoration:m.completed?"line-through":"none"}}>{m.title}</span>
                </div>
              ))}
            </div>
          </div>}
        </div>;
      })}
    </div>}
  </div>;
};

/* ─────────────────────────────────────────────
   QUIZZES
───────────────────────────────────────────── */
const Quizzes=({profile})=>profile.role==="mentor"?<MentorQuizzes profile={profile}/>:<MenteeQuizzes profile={profile}/>;

const MentorQuizzes=({profile})=>{
  const [quizzes,setQuizzes]=useState([]);
  const [loading,setLoading]=useState(true);
  const [createModal,setCreateModal]=useState(false);
  const [assignModal,setAssignModal]=useState(null);
  const [gradeModal,setGradeModal]=useState(null);
  const [mentees,setMentees]=useState([]);
  const [saving,setSaving]=useState(false);
  const [Toast,showToast]=useToast();
  const [form,setForm]=useState({title:"",description:"",total_marks:"100",due_date:"",questions:[{question:"",type:"text",marks:"10",options:[""]}]});

  useEffect(()=>{load();loadMentees()},[]);
  const load=async()=>{
    setLoading(true);
    const{data}=await db.from("quizzes").select("*,questions:quiz_questions(*),assignments:quiz_assignments(*,mentee:profiles!quiz_assignments_mentee_id_fkey(id,full_name))").eq("mentor_id",profile.id).order("created_at",{ascending:false});
    setQuizzes(data||[]);setLoading(false);
  };
  const loadMentees=async()=>{
    const{data}=await db.from("pairings").select("mentee:profiles!pairings_mentee_id_fkey(id,full_name)").eq("mentor_id",profile.id);
    setMentees(data?.map(p=>p.mentee)||[]);
  };
  const create=async()=>{
    if(!form.title){showToast("Enter a title","error");return}
    setSaving(true);
    const{data:q,error}=await db.from("quizzes").insert({title:form.title,description:form.description,mentor_id:profile.id,org_id:profile.org_id,total_marks:parseInt(form.total_marks)||100,due_date:form.due_date||null}).select().single();
    if(error){showToast(error.message,"error");setSaving(false);return}
    const qs=form.questions.filter(x=>x.question);
    if(qs.length)await db.from("quiz_questions").insert(qs.map((x,i)=>({quiz_id:q.id,question:x.question,type:x.type,marks:parseInt(x.marks)||10,options:x.type==="multiple_choice"?x.options.filter(o=>o):null,order_index:i})));
    showToast("Quiz created!");setSaving(false);setCreateModal(false);setForm({title:"",description:"",total_marks:"100",due_date:"",questions:[{question:"",type:"text",marks:"10",options:[""]}]});load();
  };
  const publish=async id=>{await db.from("quizzes").update({status:"published"}).eq("id",id);showToast("Published!");load()};
  const assign=async(quizId,menteeId)=>{
    const{error}=await db.from("quiz_assignments").insert({quiz_id:quizId,mentee_id:menteeId,assigned_by:profile.id});
    if(error){showToast(error.message,"error");return}
    await pushNotif(menteeId,"Quiz Assigned","Your mentor assigned you a new quiz. Check it out!","quiz");
    showToast("Assigned!");setAssignModal(null);load();
  };
  const grade=async(assignId,score,feedback,menteeId,quizTitle,total)=>{
    await db.from("quiz_assignments").update({score:parseInt(score),feedback,status:"graded",graded_at:new Date().toISOString()}).eq("id",assignId);
    await pushNotif(menteeId,"Quiz Graded",`Score: ${score}/${total} on "${quizTitle}"`,"quiz");
    showToast("Grade saved!");setGradeModal(null);load();
  };
  const addQ=()=>setForm(f=>({...f,questions:[...f.questions,{question:"",type:"text",marks:"10",options:[""]}]}));
  const setQ=(i,k,v)=>setForm(f=>{const qs=[...f.questions];qs[i]={...qs[i],[k]:v};return{...f,questions:qs}});

  return <div style={{padding:"28px 32px",maxWidth:820}} className="anim">
    <Toast/>
    <Modal open={createModal} onClose={()=>setCreateModal(false)} title="Create a Quiz" wide>
      <Field label="Quiz title" placeholder="e.g. Week 1 Assessment" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} required/>
      <Field label="Description" placeholder="Brief description…" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} rows={2}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Field label="Total marks" value={form.total_marks} onChange={e=>setForm(f=>({...f,total_marks:e.target.value}))}/>
        <Field label="Due date" type="date" value={form.due_date} onChange={e=>setForm(f=>({...f,due_date:e.target.value}))}/>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>Questions</div>
        {form.questions.map((q,i)=><div key={i} style={{background:C.n50,borderRadius:10,padding:"14px",marginBottom:10}}>
          <Field label={`Q${i+1}`} placeholder="Enter question…" value={q.question} onChange={e=>setQ(i,"question",e.target.value)}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Select label="Type" value={q.type} onChange={e=>setQ(i,"type",e.target.value)} options={[{value:"text",label:"Text answer"},{value:"multiple_choice",label:"Multiple choice"}]}/>
            <Field label="Marks" value={q.marks} onChange={e=>setQ(i,"marks",e.target.value)}/>
          </div>
          {q.type==="multiple_choice"&&<>
            {q.options.map((o,j)=><input key={j} placeholder={`Option ${j+1}`} value={o} onChange={e=>{const ops=[...q.options];ops[j]=e.target.value;setQ(i,"options",ops)}} style={{width:"100%",padding:"8px 12px",borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,marginBottom:6,outline:"none",display:"block"}}/>)}
            <button onClick={()=>setQ(i,"options",[...q.options,""])} style={{fontSize:12,color:C.p600,background:"none",border:"none",cursor:"pointer",fontWeight:600}}>+ option</button>
          </>}
        </div>)}
        <button onClick={addQ} style={{fontSize:12.5,color:C.p600,background:C.p50,border:"none",cursor:"pointer",fontWeight:600,padding:"7px 14px",borderRadius:7}}>+ Add Question</button>
      </div>
      <Btn onClick={create} loading={saving} style={{width:"100%"}}>Create Quiz (Draft)</Btn>
    </Modal>
    {assignModal&&<Modal open onClose={()=>setAssignModal(null)} title={`Assign "${assignModal.title}"`}>
      {mentees.length===0?<p style={{color:C.muted,fontSize:14,textAlign:"center",padding:"20px 0"}}>No mentees paired yet.</p>:
      mentees.map(m=><button key={m.id} onClick={()=>assign(assignModal.id,m.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px",borderRadius:10,border:`1px solid ${C.border}`,background:"transparent",cursor:"pointer",width:"100%",marginBottom:8}}>
        <Avatar name={m.full_name} size={36}/><span style={{fontSize:14,fontWeight:600,color:C.text}}>{m.full_name}</span>
      </button>)}
    </Modal>}
    {gradeModal&&<GradeModal assignment={gradeModal} onSave={grade} onClose={()=>setGradeModal(null)}/>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
      <div><h1 style={{fontSize:22,fontWeight:800,color:C.text,letterSpacing:"-.03em"}}>Quizzes</h1><p style={{fontSize:13,color:C.muted,marginTop:3}}>Create and manage assessments</p></div>
      <Btn onClick={()=>setCreateModal(true)}>+ Create Quiz</Btn>
    </div>
    {loading?<div style={{padding:40,textAlign:"center"}}><Spinner/></div>:
    quizzes.length===0?<Empty icon="📝" title="No quizzes yet" action={<Btn onClick={()=>setCreateModal(true)}>Create First Quiz</Btn>}/>:
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {quizzes.map(q=>{
        const pending=q.assignments?.filter(a=>a.status==="submitted")||[];
        const graded=q.assignments?.filter(a=>a.status==="graded")||[];
        return <div key={q.id} style={{background:"#fff",borderRadius:14,border:`1px solid ${C.border}`,boxShadow:C.shadow,padding:"18px 22px"}}>
          <div style={{display:"flex",justifyContent:"space-between",gap:14}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
                <span style={{fontSize:14.5,fontWeight:700,color:C.text}}>{q.title}</span>
                <Badge label={q.status} bg={q.status==="published"?C.successL:C.n50} color={q.status==="published"?C.success:C.muted}/>
                {pending.length>0&&<Badge label={`${pending.length} to grade`} bg="#fef9ee" color={C.warn}/>}
              </div>
              <div style={{fontSize:12,color:C.muted}}>{q.questions?.length||0} questions · {q.total_marks} marks{q.due_date?` · Due ${fmtDate(q.due_date)}`:""}</div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"flex-end",flexShrink:0}}>
              {q.status==="draft"&&<Btn size="sm" variant="success" onClick={()=>publish(q.id)}>Publish</Btn>}
              {q.status==="published"&&<Btn size="sm" onClick={()=>setAssignModal(q)}>Assign</Btn>}
              {pending.map(a=><Btn key={a.id} size="sm" variant="warning" onClick={()=>setGradeModal({...a,quiz:q})}>Grade: {a.mentee?.full_name}</Btn>)}
            </div>
          </div>
          {graded.length>0&&<div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${C.n50}`,display:"flex",gap:8,flexWrap:"wrap"}}>
            {graded.map(a=><span key={a.id} style={{fontSize:12,padding:"4px 10px",borderRadius:8,background:C.p50,color:C.p700}}>
              {a.mentee?.full_name}: <strong>{a.score}/{q.total_marks}</strong>
            </span>)}
          </div>}
        </div>;
      })}
    </div>}
  </div>;
};

const GradeModal=({assignment,onSave,onClose})=>{
  const [score,setScore]=useState(assignment.score||"");
  const [feedback,setFeedback]=useState(assignment.feedback||"");
  const [answers,setAnswers]=useState([]);
  const [saving,setSaving]=useState(false);
  useEffect(()=>{db.from("quiz_answers").select("*,question:quiz_questions(*)").eq("assignment_id",assignment.id).then(({data})=>setAnswers(data||[]))},[]);
  return <Modal open onClose={onClose} title={`Grade: ${assignment.mentee?.full_name}`} wide>
    {answers.length>0&&<div style={{marginBottom:18}}>
      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>Answers</div>
      {answers.map((a,i)=><div key={a.id} style={{background:C.n50,borderRadius:9,padding:"11px",marginBottom:8}}>
        <div style={{fontSize:12.5,fontWeight:600,color:C.text,marginBottom:5}}>Q{i+1}: {a.question?.question}</div>
        <div style={{fontSize:13,color:C.muted,background:"#fff",padding:"8px 10px",borderRadius:7,border:`1px solid ${C.border}`}}>{a.answer||"No answer"}</div>
      </div>)}
    </div>}
    <Field label={`Score (out of ${assignment.quiz?.total_marks||100})`} type="number" placeholder="e.g. 85" value={score} onChange={e=>setScore(e.target.value)}/>
    <Field label="Feedback" placeholder="Write feedback…" value={feedback} onChange={e=>setFeedback(e.target.value)} rows={3}/>
    <Btn loading={saving} onClick={async()=>{setSaving(true);await onSave(assignment.id,score,feedback,assignment.mentee_id,assignment.quiz?.title,assignment.quiz?.total_marks);setSaving(false)}} style={{width:"100%"}}>Save Grade</Btn>
  </Modal>;
};

    <p style={{fontSize:13,color:C.muted,marginBottom:24}}>Assignments from your mentor</p>
    {loading?<div style={{padding:40,textAlign:"center"}}><Spinner/></div>:

    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {assignments.map(a=><div key={a.id} style={{background:"#fff",borderRadius:13,border:`1px solid ${C.border}`,boxShadow:C.shadow,padding:"18px 22px"}}>
        <div style={{display:"flex",justifyContent:"space-between",gap:14}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
              <span style={{fontSize:14.5,fontWeight:700,color:C.text}}>{a.quiz?.title}</span>
              <Badge label={a.status} bg={a.status==="graded"?C.successL:a.status==="submitted"?C.p50:C.warnL} color={a.status==="graded"?C.success:a.status==="submitted"?C.p600:C.warn}/>
            </div>
            <div style={{fontSize:12,color:C.muted}}>From {a.mentor?.full_name} · {a.quiz?.questions?.length||0} questions · {a.quiz?.total_marks} marks</div>
            {a.status==="graded"&&<div style={{marginTop:10,background:C.successL,borderRadius:9,padding:"10px 14px"}}>
              <div style={{fontSize:14,fontWeight:700,color:C.success}}>Score: {a.score}/{a.quiz?.total_marks}</div>
              {a.feedback&&<div style={{fontSize:13,color:C.text,marginTop:4}}>{a.feedback}</div>}
            </div>}
          </div>

        </div>

const TakeQuiz=({assignment,profile,onDone,onClose})=>{
  const [answers,setAnswers]=useState({});
  const [saving,setSaving]=useState(false);
  const questions=(assignment.quiz?.questions||[]).sort((a,b)=>a.order_index-b.order_index);
  const submit=async()=>{
    setSaving(true);
    await db.from("quiz_answers").upsert(Object.entries(answers).map(([qId,ans])=>({assignment_id:assignment.id,question_id:qId,answer:ans})));
    await db.from("quiz_assignments").update({status:"submitted",submitted_at:new Date().toISOString()}).eq("id",assignment.id);
    await pushNotif(assignment.assigned_by,"Quiz Submitted",`${profile.full_name} submitted: ${assignment.quiz?.title}`,"quiz");
    setSaving(false);onDone();
  };
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20,overflowY:"auto"}}>
    <div style={{background:"#fff",borderRadius:18,padding:"28px",width:"100%",maxWidth:580,boxShadow:C.shadowL,maxHeight:"90vh",overflowY:"auto",animation:"fadeUp .2s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <h2 style={{fontSize:17,fontWeight:800,color:C.text}}>{assignment.quiz?.title}</h2>
        <button onClick={onClose} style={{width:28,height:28,borderRadius:"50%",border:"none",background:C.n50,fontSize:16,cursor:"pointer"}}>✕</button>
      </div>
      <p style={{fontSize:13,color:C.muted,marginBottom:20}}>{questions.length} questions · {assignment.quiz?.total_marks} marks</p>
      <div style={{display:"flex",flexDirection:"column",gap:18}}>
        {questions.map((q,i)=><div key={q.id} style={{background:C.n50,borderRadius:11,padding:"14px"}}>
          <div style={{fontSize:13.5,fontWeight:700,color:C.text,marginBottom:10}}>Q{i+1}: {q.question} <span style={{fontSize:12,color:C.muted,fontWeight:400}}>({q.marks})</span></div>
          {q.type==="multiple_choice"&&q.options?
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {q.options.map((o,j)=><label key={j} style={{display:"flex",alignItems:"center",gap:9,cursor:"pointer",padding:"9px 12px",borderRadius:8,border:`1.5px solid ${answers[q.id]===o?C.p500:C.border}`,background:answers[q.id]===o?C.p50:"#fff"}}>
                <input type="radio" name={q.id} value={o} checked={answers[q.id]===o} onChange={()=>setAnswers(a=>({...a,[q.id]:o}))} style={{accentColor:C.p500}}/>{o}
              </label>)}
            </div>:
            <textarea placeholder="Your answer…" value={answers[q.id]||""} onChange={e=>setAnswers(a=>({...a,[q.id]:e.target.value}))} rows={3} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1.5px solid ${C.border}`,fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit"}}/>}
        </div>)}
      </div>
      <Btn onClick={submit} loading={saving} style={{width:"100%",marginTop:20}}>Submit Quiz</Btn>
    </div>
  </div>;
};

const Messages=({profile})=>{
  const [convos,setConvos]=useState([]);
  const [activeId,setActiveId]=useState(null);
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(true);
  const [sending,setSending]=useState(false);
  const [pairs,setPairs]=useState([]);
  const [newModal,setNewModal]=useState(false);
  const bottom=useRef();

  useEffect(()=>{loadConvos();loadPairs()},[]);
  useEffect(()=>{if(activeId)loadMsgs(activeId)},[activeId]);
  useEffect(()=>{bottom.current?.scrollIntoView({behavior:"smooth"})},[msgs]);

  const loadConvos=async()=>{
    setLoading(true);
    const{data}=await db.from("messages").select("*,sender:profiles!messages_sender_id_fkey(id,full_name,avatar_url),recipient:profiles!messages_recipient_id_fkey(id,full_name,avatar_url)").or(`sender_id.eq.${profile.id},recipient_id.eq.${profile.id}`).order("created_at",{ascending:false});
    const seen=new Set(),cvs=[];
    for(const m of(data||[])){const o=m.sender_id===profile.id?m.recipient:m.sender;if(o&&!seen.has(o.id)){seen.add(o.id);cvs.push({other:o,last:m,unread:!m.read&&m.recipient_id===profile.id})}}
    setConvos(cvs);if(!activeId&&cvs.length)setActiveId(cvs[0].other.id);setLoading(false);
  };
  const loadPairs=async()=>{
    const oCol=profile.role==="mentor"?"mentee_id":"mentor_id";
    const fCol=profile.role==="mentor"?"mentor_id":"mentee_id";
    const{data}=await db.from("pairings").select(`other:profiles!pairings_${oCol}_fkey(id,full_name,avatar_url)`).eq(fCol,profile.id);
    setPairs(data?.map(p=>p.other)||[]);
  };
  const loadMsgs=async otherId=>{
    const{data}=await db.from("messages").select("*,sender:profiles!messages_sender_id_fkey(id,full_name,avatar_url)").or(`and(sender_id.eq.${profile.id},recipient_id.eq.${otherId}),and(sender_id.eq.${otherId},recipient_id.eq.${profile.id})`).order("created_at",{ascending:true});
    setMsgs(data||[]);
    await db.from("messages").update({read:true}).eq("recipient_id",profile.id).eq("sender_id",otherId);
  };
  const send=async()=>{
    if(!input.trim()||!activeId)return;
    setSending(true);
    await db.from("messages").insert({sender_id:profile.id,recipient_id:activeId,content:input.trim()});
    setInput("");loadMsgs(activeId);loadConvos();setSending(false);
  };
  const startWith=id=>{setActiveId(id);setNewModal(false);if(!convos.find(c=>c.other.id===id)){const o=pairs.find(p=>p.id===id);if(o)setConvos(cv=>[{other:o,last:null,unread:false},...cv])}};
  const activeOther=convos.find(c=>c.other.id===activeId)?.other;

  return <div style={{display:"flex",flex:1,height:"100%",overflow:"hidden"}}>
    <Modal open={newModal} onClose={()=>setNewModal(false)} title="New Message">
      {pairs.map(p=><button key={p.id} onClick={()=>startWith(p.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px",borderRadius:10,border:`1px solid ${C.border}`,background:"transparent",cursor:"pointer",width:"100%",marginBottom:8}}>
        <Avatar name={p.full_name} size={38} url={p.avatar_url}/><span style={{fontSize:14,fontWeight:600,color:C.text}}>{p.full_name}</span>
      </button>)}
      {pairs.length===0&&<p style={{color:C.muted,fontSize:14,textAlign:"center",padding:"20px 0"}}>No connections yet.</p>}
    </Modal>
    <div style={{width:264,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",flexShrink:0}}>
      <div style={{padding:"16px 14px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${C.n50}`}}>
        <span style={{fontSize:14,fontWeight:700,color:C.text}}>Messages</span>
        <button onClick={()=>setNewModal(true)} style={{width:26,height:26,borderRadius:"50%",border:"none",background:C.p50,color:C.p600,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>+</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"6px 8px"}}>
        {loading?<div style={{padding:20,textAlign:"center"}}><Spinner/></div>:
        convos.length===0?<Empty icon="💬" title="No messages"/>:
        convos.map(c=><div key={c.other.id} onClick={()=>setActiveId(c.other.id)} style={{display:"flex",gap:10,alignItems:"center",padding:"10px 8px",borderRadius:9,cursor:"pointer",background:activeId===c.other.id?C.p50:"transparent",marginBottom:2}}>
          <Avatar name={c.other.full_name} size={38} url={c.other.avatar_url}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:700,color:C.text}}>{c.other.full_name}</div>
            <div style={{fontSize:11.5,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:1}}>{c.last?.content||"Say hello"}</div>
          </div>
          {c.unread&&<div style={{width:8,height:8,borderRadius:"50%",background:C.p500,flexShrink:0}}/>}
        </div>)}
      </div>
    </div>
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {activeOther?<>
        <div style={{padding:"12px 20px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
          <Avatar name={activeOther.full_name} size={34} url={activeOther.avatar_url}/>
          <span style={{fontSize:14,fontWeight:700,color:C.text}}>{activeOther.full_name}</span>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"20px",display:"flex",flexDirection:"column",gap:12}}>
          {msgs.map(m=><div key={m.id} style={{display:"flex",gap:8,flexDirection:m.sender_id===profile.id?"row-reverse":"row",alignItems:"flex-end"}}>
            {m.sender_id!==profile.id&&<Avatar name={m.sender?.full_name||"?"} size={26} url={m.sender?.avatar_url}/>}
            <div style={{maxWidth:"66%",padding:"10px 13px",borderRadius:m.sender_id===profile.id?"14px 14px 3px 14px":"14px 14px 14px 3px",background:m.sender_id===profile.id?C.p600:"#fff",color:m.sender_id===profile.id?"#fff":C.text,fontSize:13,lineHeight:1.5,border:m.sender_id===profile.id?"none":`1px solid ${C.border}`,boxShadow:m.sender_id!==profile.id?C.shadow:"none"}}>
              {m.content}
              <div style={{fontSize:10,marginTop:4,opacity:.55,textAlign:m.sender_id===profile.id?"right":"left"}}>{new Date(m.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>
            </div>
          </div>)}
          <div ref={bottom}/>
        </div>
        <div style={{padding:"12px 20px",borderTop:`1px solid ${C.border}`,display:"flex",gap:10,flexShrink:0}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="Write a message…" style={{flex:1,padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:13,outline:"none",background:C.n50,color:C.text}}/>
          <Btn onClick={send} loading={sending}>Send</Btn>
        </div>
      </>:<Empty icon="💬" title="Select a conversation"/>}
    </div>
  </div>;
};
